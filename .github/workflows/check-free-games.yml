name: Check Free Games

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-free-games:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run checker
        run: npm start
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EPIC_DISCORD_WEBHOOK_URL: ${{ secrets.EPIC_DISCORD_WEBHOOK_URL }}
          STEAM_DISCORD_WEBHOOK_URL: ${{ secrets.STEAM_DISCORD_WEBHOOK_URL }}
          SALE_ALERTS_ENABLED: ${{ vars.SALE_ALERTS_ENABLED || 'true' }}
          SEND_SALE_DETAILS_TO_DISCORD: ${{ vars.SEND_SALE_DETAILS_TO_DISCORD || 'true' }}
          ENABLE_EPIC: ${{ vars.ENABLE_EPIC || 'true' }}
          ENABLE_STEAM: ${{ vars.ENABLE_STEAM || 'true' }}
          ENABLE_FREE_ALERTS: ${{ vars.ENABLE_FREE_ALERTS || 'true' }}
          ENABLE_UPCOMING_ALERTS: ${{ vars.ENABLE_UPCOMING_ALERTS || 'true' }}
          ENABLE_EVENT_ALERTS: ${{ vars.ENABLE_EVENT_ALERTS || 'true' }}
          MIN_SALE_DISCOUNT_PERCENT: ${{ vars.MIN_SALE_DISCOUNT_PERCENT || '80' }}
          MAX_SALE_ALERTS_PER_PLATFORM: ${{ vars.MAX_SALE_ALERTS_PER_PLATFORM || '5' }}
          STEAM_PAGES_TO_SCAN: ${{ vars.STEAM_PAGES_TO_SCAN || '3' }}
          CURRENCY_LOCALE: ${{ vars.CURRENCY_LOCALE || 'VN' }}
          MAX_SALE_PRICE: ${{ vars.MAX_SALE_PRICE }}
          PREFERRED_GENRES: ${{ vars.PREFERRED_GENRES }}
          EXCLUDED_GENRES: ${{ vars.EXCLUDED_GENRES }}
          MESSAGE_LOCALE: ${{ vars.MESSAGE_LOCALE || 'vi' }}
          DISCORD_MENTION_ROLE: ${{ vars.DISCORD_MENTION_ROLE || secrets.DISCORD_MENTION_ROLE }}

      - name: Commit sent history
        # Bắt đầu commit lịch sử gửi game
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git add src/storage/sent.json
          git diff --cached --quiet || {
            git commit -m "Update sent games history"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          }
